<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUTINKA | Methods</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #050505;
            --bg-tertiary: #0a0a0a;
            --bg-card: rgba(10, 10, 10, 0.8);
            --accent-red: #ef4444;
            --accent-red-light: #f87171;
            --accent-red-dark: #dc2626;
            --text-primary: #fafafa;
            --text-secondary: #a3a3a3;
            --text-tertiary: #525252;
            --border-subtle: rgba(255, 255, 255, 0.04);
            --border-hover: rgba(239, 68, 68, 0.3);
            --glow-red: rgba(239, 68, 68, 0.15);
            --discord: #5865F2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            position: relative;
        }

        /* Noise overlay */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Ambient background */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.1;
            animation: orbFloat 25s ease-in-out infinite;
        }

        .ambient-orb:nth-child(1) {
            width: 600px;
            height: 600px;
            background: var(--accent-red);
            top: -200px;
            right: -200px;
        }

        .ambient-orb:nth-child(2) {
            width: 500px;
            height: 500px;
            background: var(--accent-red-dark);
            bottom: -200px;
            left: -200px;
            animation-delay: -12s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, -40px) scale(1.08); }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 2rem;
            position: relative;
            z-index: 10;
            opacity: 0;
            transform: translateY(48px) scale(0.92);
        }

        /* Back link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 2rem;
        }

        .back-link:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(-3px);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 100px;
            margin-bottom: 1.25rem;
        }

        .badge-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--accent-red);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .title {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
        }

        .title-gradient {
            background: linear-gradient(135deg, #fff 0%, #a3a3a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            max-width: 450px;
            margin: 0 auto;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Search */
        .search-container {
            margin-bottom: 2.5rem;
        }

        .search-wrapper {
            position: relative;
            max-width: 480px;
            margin: 0 auto;
        }

        .search-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            stroke: var(--text-tertiary);
            stroke-width: 2;
            fill: none;
            pointer-events: none;
            transition: stroke 0.3s ease;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.25rem 1rem 3.25rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-subtle);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
        }

        .search-input:focus {
            border-color: rgba(239, 68, 68, 0.3);
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.06);
            background: rgba(255, 255, 255, 0.03);
        }

        .search-input:focus + .search-icon {
            stroke: var(--accent-red);
        }

        /* Section */
        .section {
            margin-bottom: 2.5rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding-left: 0.5rem;
        }

        .section-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-red);
            border-radius: 50%;
        }

        .section-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Method cards */
        .methods-list {
            display: flex;
            flex-direction: column;
            gap: 0.625rem;
        }

        .method-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
        }

        .method-card:hover {
            border-color: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        .method-card.active {
            border-color: var(--border-hover);
            box-shadow: 0 0 40px var(--glow-red);
        }

        .method-card.featured {
            border-left: 3px solid var(--accent-red);
        }

        .method-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.125rem 1.5rem;
        }

        .method-title-wrapper {
            display: flex;
            align-items: center;
            gap: 0.875rem;
        }

        .method-icon {
            font-size: 1.25rem;
            line-height: 1;
        }

        .method-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .method-chevron {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .method-chevron svg {
            width: 14px;
            height: 14px;
            stroke: var(--text-tertiary);
            stroke-width: 2.5;
            fill: none;
            transition: stroke 0.3s ease;
        }

        .method-card:hover .method-chevron svg {
            stroke: var(--text-secondary);
        }

        .method-card.active .method-chevron {
            transform: rotate(180deg);
        }

        .method-card.active .method-chevron svg {
            stroke: var(--accent-red);
        }

        /* Method content */
        .method-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                        padding 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 0 1.5rem;
        }

        .method-card.active .method-content {
            max-height: 3000px;
            padding: 0 1.5rem 1.5rem;
        }

        .method-content-inner {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.7;
        }

        .method-content-inner h4 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--accent-red);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 1.5rem 0 0.75rem;
        }

        .method-content-inner h4:first-child {
            margin-top: 0;
        }

        .method-content-inner p {
            margin-bottom: 0.75rem;
        }

        .method-content-inner ul,
        .method-content-inner ol {
            padding-left: 1.25rem;
            margin-bottom: 0.75rem;
        }

        .method-content-inner li {
            margin-bottom: 0.375rem;
        }

        .method-content-inner code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            background: rgba(0, 0, 0, 0.4);
            color: var(--accent-red-light);
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            border: 1px solid rgba(239, 68, 68, 0.15);
        }

        .method-content-inner pre {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid var(--border-subtle);
            overflow-x: auto;
            margin: 0.75rem 0;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .method-content-inner a {
            color: var(--accent-red-light);
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        .method-content-inner a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .method-content-inner .warning {
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.12);
            border-radius: 10px;
            padding: 1rem;
            margin: 1rem 0;
            color: var(--accent-red-light);
        }

        .download-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1rem;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.15);
            border-radius: 8px;
            color: var(--accent-red);
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .download-button:hover {
            background: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.25);
            transform: translateY(-1px);
        }

        /* Discord card */
        .discord-card {
            background: linear-gradient(135deg, rgba(88, 101, 242, 0.1), rgba(88, 101, 242, 0.02));
            border: 1px solid rgba(88, 101, 242, 0.2);
            border-radius: 20px;
            padding: 2.5rem;
            text-align: center;
            margin-top: 3rem;
            position: relative;
            overflow: hidden;
        }

        .discord-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(88, 101, 242, 0.3), transparent 50%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .discord-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(88, 101, 242, 0.15);
            border: 1px solid rgba(88, 101, 242, 0.25);
            border-radius: 16px;
        }

        .discord-icon svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }

        .discord-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .discord-desc {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 1.5rem;
        }

        .discord-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            background: #fff;
            color: var(--discord);
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .discord-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(88, 101, 242, 0.25);
        }

        /* No results */
        .no-results {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-tertiary);
            font-size: 0.95rem;
            display: none;
        }

        .no-results.show {
            display: block;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .container {
                padding: 1.5rem;
            }

            .method-header {
                padding: 1rem 1.25rem;
            }

            .method-card.active .method-content {
                padding: 0 1.25rem 1.25rem;
            }

            .discord-card {
                padding: 1.75rem;
            }
        }

        /* Hide for search */
        .hide {
            display: none !important;
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .container {
                transition-duration: 0.4s !important;
            }
        }
    </style>
</head>
