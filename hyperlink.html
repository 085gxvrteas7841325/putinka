<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUTINKA | Hyperlink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #000000;
            --bg-card: rgba(10, 10, 10, 0.8);
            --accent-red: #ef4444;
            --accent-red-dark: #dc2626;
            --text-primary: #fafafa;
            --text-secondary: #a3a3a3;
            --text-tertiary: #525252;
            --border-subtle: rgba(255, 255, 255, 0.04);
            --success: #22c55e;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .ambient-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .ambient-orb { position: absolute; border-radius: 50%; filter: blur(150px); opacity: 0.1; animation: orbFloat 20s ease-in-out infinite; }
        .ambient-orb:nth-child(1) { width: 500px; height: 500px; background: var(--accent-red); top: -150px; left: -150px; }
        .ambient-orb:nth-child(2) { width: 400px; height: 400px; background: var(--accent-red-dark); bottom: -100px; right: -100px; animation-delay: -10s; }
        @keyframes orbFloat { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(30px,-30px) scale(1.05); } }

        .container {
            max-width: 520px; margin: 0 auto; padding: 2rem;
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
            position: relative; z-index: 10; opacity: 0; transform: translateY(48px) scale(0.92);
        }

        .back-link {
            position: absolute; top: 2rem; left: 2rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.625rem 1rem;
            background: rgba(255,255,255,0.02); border: 1px solid var(--border-subtle);
            border-radius: 10px; color: var(--text-secondary); font-size: 0.85rem;
            font-weight: 500; text-decoration: none; transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        .back-link:hover { color: var(--text-primary); background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); transform: translateX(-3px); }
        .back-link svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; }

        .header { text-align: center; margin-bottom: 2.5rem; }
        .badge { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.15); border-radius: 100px; margin-bottom: 1.25rem; }
        .badge-text { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 500; color: var(--accent-red); text-transform: uppercase; letter-spacing: 0.15em; }
        .title { font-size: clamp(2rem,5vw,2.75rem); font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
        .title-gradient { background: linear-gradient(135deg,#fff 0%,#a3a3a3 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .subtitle { font-size: 1rem; color: var(--text-secondary); }

        .card {
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: 24px; padding: 2rem; backdrop-filter: blur(20px);
            position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; inset: 0; border-radius: 24px; padding: 1px;
            background: linear-gradient(135deg, rgba(239,68,68,0.2), transparent 50%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
        }

        .toggle-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 1.25rem;
            background: rgba(255,255,255,0.02); border: 1px solid var(--border-subtle);
            border-radius: 14px; margin-bottom: 1.25rem;
        }
        .toggle-label { font-size: 0.9rem; font-weight: 500; color: var(--text-primary); }
        .toggle-wrapper { display: flex; align-items: center; gap: 0.75rem; }
        .toggle { position: relative; width: 50px; height: 26px; background: rgba(255,255,255,0.06); border-radius: 13px; cursor: pointer; transition: all 0.3s cubic-bezier(0.16,1,0.3,1); }
        .toggle.active { background: rgba(239,68,68,0.25); }
        .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; background: var(--text-tertiary); border-radius: 50%; transition: all 0.3s cubic-bezier(0.16,1,0.3,1); }
        .toggle.active .toggle-thumb { transform: translateX(24px); background: var(--accent-red); }
        .toggle-status { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 500; color: var(--text-tertiary); min-width: 28px; transition: color 0.3s ease; }
        .toggle.active + .toggle-status { color: var(--accent-red); }

        .input-wrapper { margin-bottom: 1rem; }
        .input {
            width: 100%; padding: 1rem 1.25rem;
            background: rgba(0,0,0,0.3); border: 1px solid var(--border-subtle);
            border-radius: 14px; color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.16,1,0.3,1); outline: none;
        }
        .input::placeholder { color: var(--text-tertiary); }
        .input:focus { border-color: rgba(239,68,68,0.4); box-shadow: 0 0 0 4px rgba(239,68,68,0.08); }

        .btn {
            width: 100%; padding: 1rem 1.5rem;
            background: linear-gradient(135deg, var(--accent-red), var(--accent-red-dark));
            border: none; border-radius: 14px; color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
            position: relative; overflow: hidden;
        }
        .btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent); transition: left 0.6s ease; }
        .btn:hover::before { left: 100%; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(239,68,68,0.3); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .status { text-align: center; margin-top: 1rem; padding: 0.875rem 1rem; border-radius: 12px; font-size: 0.875rem; font-weight: 500; opacity: 0; transform: translateY(-10px); transition: all 0.3s cubic-bezier(0.16,1,0.3,1); }
        .status.show { opacity: 1; transform: translateY(0); }
        .status.success { background: rgba(34,197,94,0.08); color: var(--success); border: 1px solid rgba(34,197,94,0.15); }
        .status.error { background: rgba(239,68,68,0.08); color: var(--error); border: 1px solid rgba(239,68,68,0.15); }

        .result { margin-top: 1rem; padding: 1.25rem; background: rgba(0,0,0,0.4); border: 1px solid var(--border-subtle); border-radius: 14px; opacity: 0; transform: translateY(10px); pointer-events: none; transition: all 0.4s cubic-bezier(0.16,1,0.3,1); }
        .result.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .result-label { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
        .result-text { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--text-secondary); word-break: break-all; line-height: 1.6; padding: 1rem; background: rgba(0,0,0,0.3); border: 1px solid var(--border-subtle); border-radius: 10px; margin-bottom: 1rem; }
        .copy-btn { width: 100%; padding: 0.875rem; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; color: var(--accent-red); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .copy-btn:hover { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.35); }
        .copy-btn.copied { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.2); color: var(--success); }

        @media (max-width: 640px) {
            .container { padding: 1.5rem; padding-top: 5rem; }
            .back-link { position: relative; top: auto; left: auto; margin-bottom: 1.5rem; align-self: flex-start; }
            .card { padding: 1.5rem; }
            .toggle-row { flex-direction: column; gap: 1rem; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    <div class="ambient-bg">
        <div class="ambient-orb"></div>
        <div class="ambient-orb"></div>
    </div>

    <div class="container">
        <a href="index.html" class="back-link">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back
        </a>

        <div class="header">
            <div class="badge"><span class="badge-text">Discord Tool</span></div>
            <h1 class="title"><span class="title-gradient">Hyperlink</span></h1>
            <p class="subtitle">Create links that bypass Discord warnings</p>
        </div>

        <div class="card">
            <div class="toggle-row">
                <span class="toggle-label">Enable Link Shortening</span>
                <div class="toggle-wrapper">
                    <div id="toggleSwitch" class="toggle active">
                        <div class="toggle-thumb"></div>
                    </div>
                    <span id="toggleStatus" class="toggle-status">ON</span>
                </div>
            </div>

            <div class="input-wrapper">
                <input type="text" id="originalLink" class="input" placeholder="Paste your link here..." autocomplete="off">
            </div>

            <button id="bypassBtn" class="btn">Generate Hyperlink</button>
            <div id="statusMsg" class="status"></div>

            <div id="resultBox" class="result">
                <div class="result-label">Generated Link</div>
                <div id="resultText" class="result-text"></div>
                <button id="copyBtn" class="copy-btn">Copy to Clipboard</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            var w = document.querySelector('.container');
            function show() {
                w.style.transition = 'opacity 1s cubic-bezier(0.22,1,0.36,1), transform 1s cubic-bezier(0.22,1,0.36,1)';
                w.offsetHeight;
                w.style.opacity = '1';
                w.style.transform = 'translateY(0) scale(1)';
            }
            if (document.readyState === 'complete') requestAnimationFrame(() => requestAnimationFrame(show));
            else window.addEventListener('load', () => requestAnimationFrame(() => requestAnimationFrame(show)));
        })();

        const input        = document.getElementById('originalLink');
        const button       = document.getElementById('bypassBtn');
        const status       = document.getElementById('statusMsg');
        const resultBox    = document.getElementById('resultBox');
        const resultText   = document.getElementById('resultText');
        const copyBtn      = document.getElementById('copyBtn');
        const toggleSwitch = document.getElementById('toggleSwitch');
        const toggleStatus = document.getElementById('toggleStatus');

        let currentResult = '';
        let shorteningEnabled = true;

        toggleSwitch.addEventListener('click', () => {
            shorteningEnabled = !shorteningEnabled;
            toggleSwitch.classList.toggle('active');
            toggleStatus.textContent = shorteningEnabled ? 'ON' : 'OFF';
        });

        async function shorten(link) {
            const res = await fetch('https://yaso-proxy.vxvxvxvxvvxvxvx2.workers.dev', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: link })
            });

            const text = await res.text();

            let data;
            try {
                data = JSON.parse(text);
            } catch (e) {
                throw new Error('API error: ' + text.slice(0, 120));
            }

            if (!res.ok) throw new Error(data.error || 'HTTP ' + res.status);
            if (!data.shorturl) throw new Error(data.error || 'No shorturl returned');
            return data.shorturl;
        }

        function format(type, link) {
            switch (type) {
                case 'users':       return `[https:](${link})[//www.roblox.com/users/338428527/profile](${link})`;
                case 'share':       return `[https:](${link})[//www.roblox.com/share?code=116562041fd4d54681b915675dd54767&type=Server](${link})`;
                case 'communities': return `[https:](${link})[//www.roblox.com/communities/7809274722](${link})`;
                case 'games':       return `[https:](${link})[//www.roblox.com/share?code=626562041fd4d54681b915675dd54767&type=Server](${link})`;
                default:
                    try {
                        const domain = new URL(link).hostname.replace('www.', '');
                        return `[https:](${link})[//${domain}](${link})`;
                    } catch {
                        return `[https:](${link})[//click-here.com](${link})`;
                    }
            }
        }

        function detectType(link) {
            if (/\/users\//.test(link))       return 'users';
            if (/\/share\?/.test(link))       return 'share';
            if (/\/communities\//.test(link)) return 'communities';
            if (/\/games\//.test(link))       return 'games';
            return 'other';
        }

        function showMessage(msg, type = 'success') {
            status.textContent = msg;
            status.className = `status show ${type}`;
            setTimeout(() => { status.className = 'status'; }, 4000);
        }

        async function copyToClipboard(text) {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text); return true;
                }
            } catch(e) {}
            try {
                const ta = document.createElement('textarea');
                ta.value = text; ta.style.cssText = 'position:fixed;left:-999999px';
                document.body.appendChild(ta); ta.focus(); ta.select();
                const ok = document.execCommand('copy');
                document.body.removeChild(ta); return ok;
            } catch(e) { return false; }
        }

        button.addEventListener('click', async () => {
            const original = input.value.trim();
            if (!original) { showMessage('Please paste a link first', 'error'); return; }

            button.textContent = 'Processing...';
            button.disabled = true;
            resultBox.classList.remove('show');

            try {
                let finalLink = original;
                const type = detectType(original);

                if (shorteningEnabled) {
                    try {
                        finalLink = await shorten(original);
                    } catch (err) {
                        showMessage('Shortening failed: ' + err.message, 'error');
                        finalLink = original;
                    }
                }

                const formatted = format(type, finalLink);
                currentResult = formatted;
                resultText.textContent = formatted;
                resultBox.classList.add('show');
                showMessage('Hyperlink generated successfully', 'success');

            } catch (err) {
                showMessage('Failed to generate hyperlink', 'error');
            } finally {
                button.textContent = 'Generate Hyperlink';
                button.disabled = false;
            }
        });

        copyBtn.addEventListener('click', async () => {
            if (!currentResult) return;
            const ok = await copyToClipboard(currentResult);
            copyBtn.textContent = ok ? 'Copied!' : 'Copy Failed';
            copyBtn.classList.toggle('copied', ok);
            showMessage(ok ? 'Copied to clipboard' : 'Copy failed, please copy manually', ok ? 'success' : 'error');
            setTimeout(() => { copyBtn.textContent = 'Copy to Clipboard'; copyBtn.classList.remove('copied'); }, 2000);
        });

        input.addEventListener('keypress', e => { if (e.key === 'Enter') button.click(); });
        input.addEventListener('input', () => { resultBox.classList.remove('show'); currentResult = ''; });

        document.addEventListener('mousemove', e => {
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            document.querySelectorAll('.ambient-orb').forEach((orb, i) => {
                orb.style.transform = `translate(${x*(i+1)*15}px,${y*(i+1)*15}px)`;
            });
        });
    </script>
</body>
</html>
